name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 复制数据文件到 kivy_app
        run: |
          cp iching_data.py kivy_app/
          cp yaoci_data.py  kivy_app/
          cp iching_icon.png kivy_app/icon.png

      - name: 构建 APK
        working-directory: kivy_app
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: |
          yes | buildozer -v android debug || buildozer -v android debug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: ShiWen-v2.2.0-debug
          path: kivy_app/bin/*.apk
          retention-days: 30
