name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 复制数据文件到 kivy_app
        run: |
          cp iching_data.py kivy_app/
          cp yaoci_data.py  kivy_app/

      - name: 构建 APK（使用官方 buildozer action）
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          workdir: kivy_app
          buildozer_version: stable

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: ShiWen-v2.2.0-debug
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30
